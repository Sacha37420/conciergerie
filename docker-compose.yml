version: "3.9"

networks:
  sso-net:
    external: true
    name: sso-lab_sso-net
  dev-net:
    external: true
    name: dev-net

volumes:
  # Factures uploadées (Frais.facture). Déclaré 'external' pour survivre à
  # `clean2.sh conciergerie` (down --volumes) — sans ça chaque
  # `setup2.sh conciergerie --yes` supprimerait les factures déjà uploadées.
  conciergerie-media:
    external: true
    name: conciergerie_conciergerie-media

services:

  backend:
    build: ./backend
    container_name: conciergerie-backend
    restart: unless-stopped
    env_file: .env
    # Sync Airbnb périodique (iCal) en tâche de fond, sans nouveau service
    # (pas de Celery/Redis) : une boucle légère tourne à côté de runserver
    # dans le même conteneur.
    command: >
      sh -c "python manage.py migrate --no-input &&
             (while true; do python manage.py sync_airbnb_calendars; sleep 1800; done &) &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8084:8000"
    networks:
      - sso-net
      - dev-net
    volumes:
      - ./backend:/app
      - conciergerie-media:/app/media
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/conciergerie-api/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8000}}"

  frontend:
    build: ./frontend
    container_name: conciergerie-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4202:80"
    networks:
      - sso-net
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/nginx-entrypoint.sh:/docker-entrypoint.d/40-env-config.sh:ro
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/conciergerie/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 80}}"
